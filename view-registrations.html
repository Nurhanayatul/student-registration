<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Records</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="view-container">
        <div class="view-header">
            <h2>Student Records</h2>
            <a href="menu.html" class="back-btn">← Back</a>
        </div>
        
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Search by name or matric...">
            <button onclick="searchData()" class="search-btn">Search</button>
            <button onclick="loadData()" class="clear-btn">Clear</button>
        </div>
        
        <div id="resultsCount" class="results-count"></div>
        
        <div class="table-responsive">
            <table class="registration-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Matric</th>
                        <th>Phone</th>
                        <th>Address</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="6" class="no-data">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        
        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = 'index.html';
            else loadData();
        });

        window.loadData = async function() {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '<tr><td colspan="6" class="no-data">Loading...</td></tr>';
            
            try {
                const q = query(collection(db, "registrations"), orderBy("createdAt", "desc"));
                const snapshot = await getDocs(q);
                const data = [];
                snapshot.forEach(doc => data.push(doc.data()));
                displayData(data);
            } catch (error) {
                tableBody.innerHTML = `<tr><td colspan="6" class="no-data">Error: ${error.message}</td></tr>`;
            }
        }

        window.searchData = async function() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            if (!term) return loadData();
            
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '<tr><td colspan="6" class="no-data">Searching...</td></tr>';
            
            try {
                const q = query(collection(db, "registrations"), orderBy("createdAt", "desc"));
                const snapshot = await getDocs(q);
                const data = [];
                
                snapshot.forEach(doc => {
                    const d = doc.data();
                    if (d.nama.toLowerCase().includes(term) || d.no_matric.toLowerCase().includes(term)) {
                        data.push(d);
                    }
                });
                
                displayData(data);
            } catch (error) {
                tableBody.innerHTML = `<tr><td colspan="6" class="no-data">Error: ${error.message}</td></tr>`;
            }
        }

        function displayData(data) {
            const tableBody = document.getElementById('tableBody');
            document.getElementById('resultsCount').textContent = `Total: ${data.length} records`;
            
            if (data.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="6" class="no-data">No records found</td></tr>';
                return;
            }
            
            let html = '';
            data.forEach((item, i) => {
                const date = new Date(item.createdAt).toLocaleDateString('en-MY');
                html += `<tr>
                    <td>${i+1}</td>
                    <td><strong>${item.nama}</strong></td>
                    <td>${item.no_matric}</td>
                    <td>${item.no_phone}</td>
                    <td>${item.address.substring(0, 30)}...</td>
                    <td>${date}</td>
                </tr>`;
            });
            
            tableBody.innerHTML = html;
        }
    </script>
</body>
</html>
